<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MCPHub Dashboard</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* Splash loading screen — shown until React mounts and replaces #root contents */
    #splash-loader {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #f3f4f6;
      z-index: 9999;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      transition: opacity 0.3s ease-out;
    }
    #splash-loader.fade-out {
      opacity: 0;
      pointer-events: none;
    }
    #splash-loader .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #e5e7eb;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    #splash-loader .label {
      margin-top: 16px;
      font-size: 14px;
      color: #6b7280;
      letter-spacing: 0.02em;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>

<body class="bg-gray-100">
  <!-- Splash loading screen (removed by React once it mounts) -->
  <div id="splash-loader">
    <div class="spinner"></div>
    <div class="label" id="splash-label"></div>
  </div>
  <div id="root"></div>
  <!-- Inline i18n for splash screen (before React/i18n loads) -->
  <script>
    (function() {
      var lang = (navigator.language || 'en').toLowerCase();
      var texts = {
        zh: '正在加载中…',
        en: 'Loading…',
        fr: 'Chargement…',
        tr: 'Yükleniyor…'
      };
      var key = 'en';
      if (lang.startsWith('zh')) key = 'zh';
      else if (lang.startsWith('fr')) key = 'fr';
      else if (lang.startsWith('tr')) key = 'tr';
      document.getElementById('splash-label').textContent = texts[key] || texts.en;
    })();
  </script>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
