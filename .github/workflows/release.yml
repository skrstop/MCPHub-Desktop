name: Release

# 触发条件：推送 v* 格式的 tag 或手动触发
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# 允许写入 release
permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
#          # macOS Apple Silicon (arm64) — native
#          - platform: macos-latest
#            target: aarch64-apple-darwin
#            runtime-arch: arm64
#            bundles: dmg
#            platform-tag: macos-arm64
#
#          # macOS Intel (x64) — native
#          - platform: macos-13
#            target: x86_64-apple-darwin
#            runtime-arch: x64
#            bundles: dmg
#            platform-tag: macos-x64

          # Linux x64 — native
          # Note: AppImage bundling (linuxdeploy) is unreliable in CI, only build deb/rpm
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            runtime-arch: x64
            bundles: deb,rpm
            platform-tag: linux-x64

          # Linux arm64 — GitHub 托管 ARM runner
          # Note: linuxdeploy (AppImage) doesn't support ARM64, so only build deb
          - platform: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            runtime-arch: arm64
            bundles: deb
            platform-tag: linux-arm64

          # Windows x64 — native
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            runtime-arch: x64
            bundles: nsis,msi
            platform-tag: windows-x64

          # Windows arm64 — 在 x64 runner 上交叉编译
          - platform: windows-latest
            target: aarch64-pc-windows-msvc
            runtime-arch: arm64
            bundles: nsis,msi
            platform-tag: windows-arm64

    runs-on: ${{ matrix.platform }}

    steps:
      # ─── 检出代码 ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v6

      # ─── 安装 Node.js ──────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # ─── 安装 Rust + 目标 triple ───────────────────────────────────────────
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # ─── Windows arm64 交叉编译工具链 ─────────────────────────────────────
      - name: Install Windows ARM64 MSVC toolchain
        if: matrix.target == 'aarch64-pc-windows-msvc'
        run: |
          rustup target add aarch64-pc-windows-msvc
          echo "Added aarch64-pc-windows-msvc target"

      # ─── Rust 构建缓存 ─────────────────────────────────────────────────────
      - name: Cache Rust
        uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: src-tauri
          key: ${{ matrix.target }}

      # ─── Linux 系统依赖 ────────────────────────────────────────────────────
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            patchelf \
            libssl-dev \
            pkg-config \
            file \
            libfuse2 \
            xdg-utils

      # ─── 安装根目录依赖（tauri-cli）────────────────────────────────────────
      - name: Install root deps
        run: npm install

      # ─── 安装前端依赖 ──────────────────────────────────────────────────────
      - name: Install frontend deps
        run: cd frontend && npm install

      # ─── 下载 bundled runtimes（Unix）─────────────────────────────────────
      - name: Download bundled runtimes (Unix)
        if: runner.os != 'Windows'
        run: bash scripts/download-runtimes.sh
        env:
          TARGET_ARCH: ${{ matrix.runtime-arch }}

      # ─── 下载 bundled runtimes（Windows）──────────────────────────────────
      - name: Download bundled runtimes (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\scripts\download-runtimes.ps1 -TargetArch "${{ matrix.runtime-arch }}"

      # ─── 读取签名私钥 ─────────────────────────────────────────────────────
      - name: Read signing key
        id: signing-key
        shell: bash
        run: |
          if [ -f "src-tauri/updater/mcphub.key" ]; then
            echo "key=$(cat src-tauri/updater/mcphub.key)" >> $GITHUB_OUTPUT
            echo "✅ Signing key found"
          else
            echo "⚠️  Signing key not found, using secret if available"
            echo "key=${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}" >> $GITHUB_OUTPUT
          fi

      # ─── 编译 Tauri 应用 ───────────────────────────────────────────────────
      - name: Build Tauri app
        run: npm run tauri build -- --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}
        env:
          # 开源项目：使用仓库中的私钥文件，或 GitHub Secrets
          TAURI_SIGNING_PRIVATE_KEY: ${{ steps.signing-key.outputs.key }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD || '' }}
          # Cargo 网络重试（应对 crates.io 连接不稳定）
          CARGO_NET_RETRY: 10
          CARGO_HTTP_TIMEOUT: 120

      # ─── 收集产物并重命名 ──────────────────────────────────────────────────
      # 命名规则: mcphub-desktop-{platform-tag}.{ext}
      # macOS: .dmg + .app.tar.gz（updater）+ .app.tar.gz.sig（updater 签名）
      - name: Collect artifacts (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist-artifacts
          BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle"
          TAG="${{ matrix.platform-tag }}"
          # .dmg installer
          DMG=$(find "$BUNDLE_DIR" -name "*.dmg" | head -1)
          if [ -n "$DMG" ]; then
            cp "$DMG" "dist-artifacts/mcphub-desktop-${TAG}.dmg"
          fi
          # .app.tar.gz (updater payload)
          ATG=$(find "$BUNDLE_DIR" -name "*.app.tar.gz" ! -name "*.app.tar.gz.sig" | head -1)
          if [ -n "$ATG" ]; then
            cp "$ATG" "dist-artifacts/mcphub-desktop-${TAG}.app.tar.gz"
          fi
          # .app.tar.gz.sig (updater signature)
          ASIG=$(find "$BUNDLE_DIR" -name "*.app.tar.gz.sig" | head -1)
          if [ -n "$ASIG" ]; then
            cp "$ASIG" "dist-artifacts/mcphub-desktop-${TAG}.app.tar.gz.sig"
          fi

      # Linux: .deb + .rpm（AppImage 在 CI 中不可靠，已禁用）
      - name: Collect artifacts (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist-artifacts
          BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle"
          TAG="${{ matrix.platform-tag }}"
          # .deb package
          DEB=$(find "$BUNDLE_DIR" -name "*.deb" | head -1)
          if [ -n "$DEB" ]; then
            cp "$DEB" "dist-artifacts/mcphub-desktop-${TAG}.deb"
          fi
          # .rpm package
          RPM=$(find "$BUNDLE_DIR" -name "*.rpm" | head -1)
          if [ -n "$RPM" ]; then
            cp "$RPM" "dist-artifacts/mcphub-desktop-${TAG}.rpm"
          fi

      # Windows: NSIS 安装包 (.exe) + .nsis.zip + .nsis.zip.sig（updater 专用）
      - name: Collect artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist-artifacts | Out-Null
          $Tag = "${{ matrix.platform-tag }}"
          $BundleDir = "src-tauri/target/${{ matrix.target }}/release/bundle"
          # .exe (NSIS installer)
          $Exe = Get-ChildItem -Recurse -Path $BundleDir -Filter "*.exe" | Select-Object -First 1
          if ($Exe) { Copy-Item $Exe.FullName "dist-artifacts/mcphub-desktop-$Tag.exe" }
          # .msi
          $Msi = Get-ChildItem -Recurse -Path $BundleDir -Filter "*.msi" | Select-Object -First 1
          if ($Msi) { Copy-Item $Msi.FullName "dist-artifacts/mcphub-desktop-$Tag.msi" }
          # .nsis.zip (updater payload)
          $Nsis = Get-ChildItem -Recurse -Path $BundleDir -Filter "*.nsis.zip" | Where-Object { $_.Name -notmatch '\.sig$' } | Select-Object -First 1
          if ($Nsis) { Copy-Item $Nsis.FullName "dist-artifacts/mcphub-desktop-$Tag.nsis.zip" }
          # .nsis.zip.sig (updater signature)
          $Nsig = Get-ChildItem -Recurse -Path $BundleDir -Filter "*.nsis.zip.sig" | Select-Object -First 1
          if ($Nsig) { Copy-Item $Nsig.FullName "dist-artifacts/mcphub-desktop-$Tag.nsis.zip.sig" }

      # ─── 上传产物到 Actions Artifacts ─────────────────────────────────────
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: mcphub-desktop-${{ matrix.target }}
          path: dist-artifacts/
          if-no-files-found: warn

  # ─── 创建 GitHub Release + 生成 latest.json ──────────────────────────────
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # 从 tauri.conf.json 读取版本号
      - name: Read version from tauri.conf.json
        id: version
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('src-tauri/tauri.conf.json'))['version'])")
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "✅ Version: ${VERSION}, Tag: ${TAG}"

      # 下载全部平台产物
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: all-artifacts
          pattern: mcphub-desktop-*
          merge-multiple: false

      - name: List artifacts
        run: find all-artifacts -type f | sort

      # 从各平台 .sig 文件自动生成 latest.json
      - name: Generate latest.json
        env:
          REPO: ${{ github.repository }}
        run: |
          python3 - <<'PYEOF'
          import os, json, glob
          from datetime import datetime, timezone

          repo     = os.environ['REPO']                 # e.g. skrstop/MCPHub-Desktop
          pub_date = datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ')

          # 从 tauri.conf.json 读取版本号
          with open('src-tauri/tauri.conf.json', 'r', encoding='utf-8') as f:
              tauri_conf = json.load(f)
          version = tauri_conf['version']
          tag = f'v{version}'
          base_url = f"https://github.com/{repo}/releases/download/{tag}"

          print(f'✅ Version from tauri.conf.json: {version}')
          print(f'✅ Tag: {tag}')

          def classify(filename: str):
              """根据文件名推断 Tauri updater 平台 key
              文件名格式: mcphub-desktop-{platform-tag}.{ext}
              platform-tag: macos-arm64, macos-x64, linux-x64, windows-x64, windows-arm64
              """
              n = filename.lower()
              if '.app.tar.gz' in n:
                  return 'darwin-aarch64' if 'arm64' in n else 'darwin-x86_64'
              if 'appimage.tar.gz' in n:
                  return 'linux-aarch64' if 'arm64' in n else 'linux-x86_64'
              if 'nsis.zip' in n:
                  return 'windows-aarch64' if 'arm64' in n else 'windows-x86_64'
              return None

          platforms = {}
          for sig_path in sorted(glob.glob('all-artifacts/**/*.sig', recursive=True)):
              # 去掉末尾 .sig 得到资源文件名
              asset_name = os.path.basename(sig_path[:-4])
              platform   = classify(asset_name)
              if platform is None:
                  print(f'  [skip] {asset_name} — 无法识别平台')
                  continue
              sig_content = open(sig_path).read().strip()
              # GitHub releases 会把文件名中的空格替换为 '.' 生成下载 URL
              url_name = asset_name.replace(' ', '.')
              platforms[platform] = {
                  'signature': sig_content,
                  'url': f"{base_url}/{url_name}",
              }
              print(f'  [ok] {platform} -> {url_name}')

          if not platforms:
              print('WARNING: 未找到任何 .sig 文件，latest.json 的 platforms 为空。')
              print('         请确认已配置 TAURI_SIGNING_PRIVATE_KEY secret。')

          # 读取版本更新说明
          notes_file = f'doc/upgrade/{version}.md'
          if os.path.exists(notes_file):
              with open(notes_file, 'r', encoding='utf-8') as f:
                  notes = f.read().strip()
              print(f'✅ Loaded release notes from {notes_file}')
          else:
              notes = '暂无更新说明'
              print(f'⚠️  No release notes found at {notes_file}, using default')

          data = {
              'version': version,
              'notes': notes,
              'pub_date': pub_date,
              'platforms': platforms,
          }

          os.makedirs('release-meta', exist_ok=True)
          out_path = 'release-meta/latest.json'
          with open(out_path, 'w', encoding='utf-8') as f:
              json.dump(data, f, indent=2, ensure_ascii=False)

          print(f'\nGenerated latest.json with {len(platforms)} platform(s):')
          print(json.dumps(data, indent=2, ensure_ascii=False))
          PYEOF

      # 验证生成结果
      - name: Show latest.json
        run: cat release-meta/latest.json

      # 创建 draft Release，上传全部产物 + latest.json
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: MCPHub Desktop ${{ steps.version.outputs.tag }}
          draft: true
          prerelease: false
          generate_release_notes: true
          files: |
            all-artifacts/**/*
            release-meta/latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
