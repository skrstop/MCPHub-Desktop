name: Release

# 触发条件：推送 v* 格式的 tag 或手动触发
on:
#  push:
#    tags:
#      - 'v*'
  workflow_dispatch:

# 允许写入 release
permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    env:
      PYTHONIOENCODING: utf-8
    strategy:
      fail-fast: false
      matrix:
        include:
#          # macOS Apple Silicon (arm64) — native on macos-14
#          - platform: macos-14
#            target: aarch64-apple-darwin
#            runtime-arch: arm64
#            bundles: app,dmg
#            platform-tag: macos-arm64
#
#          # macOS Intel (x64) — cross-compile on ARM64 runner
#          - platform: macos-14
#            target: x86_64-apple-darwin
#            runtime-arch: x64
#            bundles: app,dmg
#            platform-tag: macos-x64
#
#          # Linux x64 — native
#          - platform: ubuntu-22.04
#            target: x86_64-unknown-linux-gnu
#            runtime-arch: x64
#            bundles: deb,rpm
#            platform-tag: linux-x64
#
#          # Linux arm64 — GitHub hosted ARM runner
#          - platform: ubuntu-22.04-arm
#            target: aarch64-unknown-linux-gnu
#            runtime-arch: arm64
#            bundles: deb,rpm
#            platform-tag: linux-arm64

          # Windows x64 — native
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            runtime-arch: x64
            bundles: nsis,msi
            platform-tag: windows-x64

          # Windows arm64 — cross-compile on x64 runner
          - platform: windows-latest
            target: aarch64-pc-windows-msvc
            runtime-arch: arm64
            bundles: nsis,msi
            platform-tag: windows-arm64

    runs-on: ${{ matrix.platform }}

    steps:
      # ─── 检出代码 ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v6

      - name: Print build info
        shell: bash
        run: |
          echo "========================================="
          echo "  Build Configuration"
          echo "========================================="
          echo "Platform:      ${{ matrix.platform }}"
          echo "Target:        ${{ matrix.target }}"
          echo "Runtime arch:  ${{ matrix.runtime-arch }}"
          echo "Bundles:       ${{ matrix.bundles }}"
          echo "Platform tag:  ${{ matrix.platform-tag }}"
          echo "Runner OS:      ${{ runner.os }}"
          echo "Runner arch:   ${{ runner.arch }}"
          echo "Event:         ${{ github.event_name }}"
          echo "Ref:           ${{ github.ref }}"
          echo "SHA:           ${{ github.sha }}"
          echo "========================================="
          echo ""
          echo "=== Current directory ==="
          pwd
          echo ""
          echo "=== Directory listing ==="
          ls -la
          echo ""
          echo "=== Disk space ==="
          df -h . 2>/dev/null || echo "(df not available)"

      # ─── 安装 Node.js ──────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Print Node.js info
        shell: bash
        run: |
          echo "========================================="
          echo "  Node.js Environment"
          echo "========================================="
          echo "Node.js path:  $(which node)"
          echo "Node.js version: $(node --version)"
          echo "npm path:      $(which npm)"
          echo "npm version:     $(npm --version)"
          echo "npx path:      $(which npx)"
          echo ""
          echo "=== npm config ==="
          npm config list
          echo ""
          echo "=== NODE_ENV ==="
          echo "NODE_ENV=${NODE_ENV:-<not set>}"
          echo "========================================="

      # ─── 安装 Rust + 目标 triple ───────────────────────────────────────────
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Print Rust info
        shell: bash
        run: |
          echo "========================================="
          echo "  Rust Environment"
          echo "========================================="
          echo "Active toolchain:"
          rustup show active-toolchain
          echo ""
          echo "Installed targets:"
          rustup target list --installed
          echo ""
          echo "Rust version: $(rustc --version)"
          echo "Rust host:    $(rustc -vV | grep host | awk '{print $2}')"
          echo "Cargo version: $(cargo --version)"
          echo ""
          echo "=== rustup show ==="
          rustup show
          echo ""
          echo "=== CARGO_HOME ==="
          echo "CARGO_HOME=${CARGO_HOME:-<not set>}"
          echo "RUSTUP_HOME=${RUSTUP_HOME:-<not set>}"
          echo "========================================="

      # ─── Windows arm64 交叉编译工具链 ─────────────────────────────────────
      - name: Install Windows ARM64 MSVC toolchain
        if: matrix.target == 'aarch64-pc-windows-msvc'
        shell: bash
        run: |
          echo "========================================="
          echo "  Installing Windows ARM64 MSVC toolchain"
          echo "========================================="
          echo "Adding target: aarch64-pc-windows-msvc"
          rustup target add aarch64-pc-windows-msvc
          echo ""
          echo "Installed targets after add:"
          rustup target list --installed
          echo "✅ aarch64-pc-windows-msvc target added"
          echo "========================================="

      # ─── Rust 构建缓存 ─────────────────────────────────────────────────────
      - name: Cache Rust
        uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: src-tauri
          key: ${{ matrix.target }}

      # ─── Linux 系统依赖 ────────────────────────────────────────────────────
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          echo "========================================="
          echo "  Installing Linux System Dependencies"
          echo "========================================="
          echo "[1/3] apt-get update..."
          sudo apt-get update
          echo ""
          echo "[2/3] apt-get install..."
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            patchelf \
            libssl-dev \
            pkg-config \
            file \
            libfuse2 \
            xdg-utils
          echo ""
          echo "[3/3] Verify installed packages..."
          echo "pkg-config version: $(pkg-config --version)"
          echo "openssl version: $(openssl version 2>/dev/null || echo 'not found')"
          echo ""
          echo "=== Installed webkit2gtk ==="
          dpkg -l | grep webkit2gtk || echo "not found"
          echo ""
          echo "✅ Linux dependencies installed"
          echo "========================================="

      # ─── 安装根目录依赖（tauri-cli）────────────────────────────────────────
      - name: Install root deps
        shell: bash
        run: |
          echo "========================================="
          echo "  Installing Root npm Dependencies"
          echo "========================================="
          echo "Current directory: $(pwd)"
          echo ""
          echo "[1/4] package.json contents:"
          cat package.json
          echo ""
          echo "[2/4] npm install..."
          npm install
          echo ""
          echo "[3/4] node_modules size:"
          du -sh node_modules 2>/dev/null || echo "node_modules not found"
          echo ""
          echo "[4/4] Verify tauri-cli installed:"
          npx tauri --version 2>/dev/null || echo "tauri-cli not found"
          echo ""
          echo "=== @tauri-apps/cli version ==="
          cat node_modules/@tauri-apps/cli/package.json 2>/dev/null | grep '"version"' || echo "not found"
          echo ""
          echo "✅ Root deps installed"
          echo "========================================="

      # ─── 安装前端依赖 ──────────────────────────────────────────────────────
      - name: Install frontend deps
        shell: bash
        run: |
          echo "========================================="
          echo "  Installing Frontend npm Dependencies"
          echo "========================================="
          echo "Current directory: $(pwd)"
          echo ""
          echo "[1/4] frontend/package.json contents:"
          cat frontend/package.json
          echo ""
          echo "[2/4] cd frontend && npm install..."
          cd frontend && npm install
          echo ""
          echo "[3/4] frontend/node_modules size:"
          du -sh node_modules 2>/dev/null || echo "node_modules not found"
          echo ""
          echo "[4/4] Verify frontend build tools:"
          echo "vite: $(npx vite --version 2>/dev/null || echo 'not found')"
          echo ""
          echo "✅ Frontend deps installed"
          echo "========================================="

      # ─── 下载运行时（Node.js + uv + Python）────────────────────────────────
      - name: Download runtimes
        shell: bash
        run: |
          echo "========================================="
          echo "  Downloading Runtimes"
          echo "========================================="
          echo "Target arch: ${{ matrix.runtime-arch }}"
          echo ""
          if [ "$RUNNER_OS" == "Windows" ]; then
            echo "Using PowerShell script for Windows..."
            pwsh -File scripts/download-runtimes.ps1 -TargetArch "${{ matrix.runtime-arch }}"
          else
            echo "Using bash script for Linux/macOS..."
            TARGET_ARCH=${{ matrix.runtime-arch }} bash scripts/download-runtimes.sh
          fi
          echo ""
          echo "=== Runtimes directory ==="
          ls -la src-tauri/runtimes/
          echo ""
          du -sh src-tauri/runtimes/
          echo "========================================="

      # ─── 解码签名密钥 ─────────────────────────────────────────────────────
      - name: Decode signing key
        shell: bash
        run: |
          echo "========================================="
          echo "  [1/6] Locate key file"
          echo "========================================="
          KEY_FILE="src-tauri/updater/mcphub.key"
          echo "KEY_FILE=$KEY_FILE"
          echo "Current directory: $(pwd)"
          echo ""
          if [ ! -f "$KEY_FILE" ]; then
            echo "❌ ERROR: Key file not found: $KEY_FILE"
            echo "Listing src-tauri/updater/:"
            ls -la src-tauri/updater/ 2>/dev/null || echo "Directory not found"
            exit 1
          fi
          ls -la "$KEY_FILE"
          echo "✅ File found"

          echo ""
          echo "========================================="
          echo "  [2/6] Read raw file bytes"
          echo "========================================="
          xxd "$KEY_FILE"
          echo ""
          echo "File size (bytes): $(wc -c < "$KEY_FILE")"
          echo "File size (chars): $(wc -m < "$KEY_FILE")"
          echo "File line count:   $(wc -l < "$KEY_FILE")"
          echo ""
          echo "File content (raw):"
          cat "$KEY_FILE"
          echo ""

          echo ""
          echo "========================================="
          echo "  [3/6] Prepare key for Tauri"
          echo "========================================="
          # Tauri CLI 报错 "Invalid symbol 32, offset 9" — 空格在 "untrusted comment:" 的第 9 位
          # 说明 Tauri CLI 对 TAURI_SIGNING_PRIVATE_KEY 会做 base64 解码
          # 所以直接传文件原始 base64 内容，不做 decode
          echo "Strategy: pass RAW base64 content from file (no decode)"
          echo ""
          RAW=$(tr -d '\r\n' < "$KEY_FILE")
          echo "RAW length: ${#RAW} chars"
          echo "RAW content:"
          echo "$RAW"
          echo ""
          echo "RAW hex dump:"
          printf '%s' "$RAW" | xxd
          echo ""
          echo "First 30 chars: ${RAW:0:30}"
          echo "✅ RAW content prepared"

          echo ""
          echo "========================================="
          echo "  [4/6] Write to GITHUB_ENV"
          echo "========================================="
          echo "GITHUB_ENV=$GITHUB_ENV"
          echo ""
          {
            printf 'TAURI_SIGNING_PRIVATE_KEY=%s\n' "$RAW"
          } >> "$GITHUB_ENV"
          echo "✅ Written to GITHUB_ENV"

          echo ""
          echo "========================================="
          echo "  [5/6] Dump GITHUB_ENV file"
          echo "========================================="
          echo "--- GITHUB_ENV hex dump START ---"
          xxd "$GITHUB_ENV"
          echo "--- GITHUB_ENV hex dump END ---"
          echo ""
          echo "--- GITHUB_ENV text START ---"
          cat "$GITHUB_ENV"
          echo "--- GITHUB_ENV text END ---"

          echo ""
          echo "========================================="
          echo "  [6/6] Verify env var (read back)"
          echo "========================================="
          VERIFY=$(grep '^TAURI_SIGNING_PRIVATE_KEY=' "$GITHUB_ENV" | cut -d= -f2-)
          echo "Read-back value length: ${#VERIFY} chars"
          echo "Read-back first 50 chars: ${VERIFY:0:50}"
          echo "Read-back last 10 chars:  ${VERIFY: -10}"
          echo ""
          if [ "$VERIFY" = "$RAW" ]; then
            echo "✅ Read-back matches RAW content"
          else
            echo "❌ MISMATCH between RAW and read-back!"
            echo "RAW length: ${#RAW}, Read-back length: ${#VERIFY}"
          fi
          echo ""
          echo "✅ DONE — signing key set"

      # ─── 编译 Tauri 应用 ───────────────────────────────────────────────────
      - name: Build Tauri app
        shell: bash
        run: |
          echo "========================================="
          echo "  Building Tauri App"
          echo "========================================="
          echo "Target:  ${{ matrix.target }}"
          echo "Bundles: ${{ matrix.bundles }}"
          echo ""
          echo "=== Environment variables ==="
          echo "TAURI_SIGNING_PRIVATE_KEY set: $([ -n \"$TAURI_SIGNING_PRIVATE_KEY\" ] && echo YES || echo NO)"
          echo "TAURI_SIGNING_PRIVATE_KEY length: ${#TAURI_SIGNING_PRIVATE_KEY} chars"
          echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD: '${TAURI_SIGNING_PRIVATE_KEY_PASSWORD}'"
          echo ""
          echo "TAURI_SIGNING_PRIVATE_KEY first line: $(echo \"$TAURI_SIGNING_PRIVATE_KEY\" | head -1)"
          echo "TAURI_SIGNING_PRIVATE_KEY line count: $(echo \"$TAURI_SIGNING_PRIVATE_KEY\" | wc -l | tr -d ' ')"
          echo ""
          echo "=== tauri.conf.json ==="
          cat src-tauri/tauri.conf.json
          echo ""
          echo "=== Cargo.toml ==="
          cat src-tauri/Cargo.toml
          echo ""
          echo "=== tauri-cli version ==="
          npx tauri --version 2>/dev/null || echo "tauri-cli not found"
          echo ""
          echo "⚠️  Note: macOS bundles MUST include 'app' target to generate updater artifacts."
          echo "   'dmg' alone does NOT generate .app.tar.gz / .app.tar.gz.sig"
          echo "   Windows 'nsis' target generates .nsis.zip / .nsis.zip.sig"
          echo ""
          echo "[START] npm run tauri build..."
          echo "========================================="
          npm run tauri build -- --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}
          EXIT_CODE=$?
          echo "========================================="
          echo "[END] npm run tauri build"
          echo "Exit code: $EXIT_CODE"
          if [ $EXIT_CODE -ne 0 ]; then
            echo "❌ Tauri build FAILED with exit code $EXIT_CODE"
          else
            echo "✅ Tauri build succeeded"
          fi
          exit $EXIT_CODE
        env:
          # TAURI_SIGNING_PRIVATE_KEY 已通过 GITHUB_ENV 设置（由上一步解码）
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
          CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
          CARGO_NET_RETRY: 10
          CARGO_HTTP_TIMEOUT: 120

      # ─── 调试：检查 runtimes 资源是否正确打包 ──────────────────────────────
      - name: Debug runtimes in bundle
        if: always()
        shell: bash
        run: |
          echo "========================================="
          echo "  Runtimes Debug: ${{ matrix.platform-tag }}"
          echo "========================================="
          BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle"
          echo "BUNDLE_DIR=$BUNDLE_DIR"
          echo ""

          echo "=== Source runtimes directory ==="
          if [ -d "src-tauri/runtimes" ]; then
            find src-tauri/runtimes -name "python*" -type f 2>/dev/null | head -10
            echo ""
            echo "Python dir exists: $(find src-tauri/runtimes -path '*/python*' -type d | head -3)"
          else
            echo "❌ src-tauri/runtimes NOT found"
          fi
          echo ""

          echo "=== Python files in bundle ==="
          if [ -d "$BUNDLE_DIR" ]; then
            PY_COUNT=$(find "$BUNDLE_DIR" -name "python*" -type f 2>/dev/null | wc -l)
            echo "Python files found in bundle: $PY_COUNT"
            find "$BUNDLE_DIR" -name "python*" -type f 2>/dev/null | head -20
            echo ""
            echo "=== Runtimes in bundle ==="
            find "$BUNDLE_DIR" -path "*/runtimes/*" -type f 2>/dev/null | head -30
            echo ""
            echo "=== Runtimes dirs in bundle ==="
            find "$BUNDLE_DIR" -path "*/runtimes/*" -type d 2>/dev/null | head -20
          else
            echo "❌ Bundle directory NOT found"
          fi
          echo ""
          echo "========================================="

      # ─── 调试：列出构建产物 ─────────────────────────────────────────────────
      - name: List build artifacts
        if: always()
        shell: bash
        run: |
          echo "========================================="
          echo "  Build Artifacts: ${{ matrix.platform-tag }}"
          echo "========================================="
          BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle"
          echo "BUNDLE_DIR=$BUNDLE_DIR"
          echo ""
          if [ -d "$BUNDLE_DIR" ]; then
            echo "✅ Bundle directory exists"
            echo ""
            echo "=== All files in bundle directory ==="
            find "$BUNDLE_DIR" -type f | sort
            echo ""
            echo "=== File sizes ==="
            find "$BUNDLE_DIR" -type f -exec ls -lh {} \; | sort
          else
            echo "❌ Bundle directory NOT found: $BUNDLE_DIR"
            echo ""
            echo "Checking if target/release directory exists..."
            if [ -d "src-tauri/target/${{ matrix.target }}/release" ]; then
              echo "Release directory exists, listing top-level:"
              ls -la "src-tauri/target/${{ matrix.target }}/release/" | head -30
            else
              echo "Release directory not found either"
              echo ""
              echo "Checking if target directory exists..."
              if [ -d "src-tauri/target" ]; then
                echo "target directory exists:"
                ls -la src-tauri/target/
              else
                echo "target directory not found"
              fi
            fi
          fi
          echo ""
          echo "=== .sig files (updater signatures) ==="
          SIG_COUNT=0
          if [ -d "$BUNDLE_DIR" ]; then
            while IFS= read -r f; do
              SIG_SIZE=$(ls -lh "$f" | awk '{print $5}')
              echo "  ✅ $f ($SIG_SIZE)"
              echo "     Content (hex):"
              xxd "$f" | head -5
              echo ""
              SIG_COUNT=$((SIG_COUNT + 1))
            done < <(find "$BUNDLE_DIR" -name "*.sig" -type f 2>/dev/null)
          fi
          if [ "$SIG_COUNT" -eq 0 ]; then
            echo "  ⚠️  No .sig files found! Updater artifacts were NOT generated."
            echo "  This usually means TAURI_SIGNING_PRIVATE_KEY was not set correctly,"
            echo "  OR the bundles config does not include an updater-enabled target."
            echo ""
            echo "  ⚠️  macOS: bundles must include 'app' (not just 'dmg')"
            echo "  ⚠️  Windows: bundles must include 'nsis'"
            echo "  ⚠️  Linux: no updater support (deb/rpm only)"
          else
            echo "  ✅ Found $SIG_COUNT .sig file(s)"
          fi
          echo ""
          echo "=== Platform-specific files ==="
          echo "macOS (.dmg, .app.tar.gz):"
          find "$BUNDLE_DIR" \( -name "*.dmg" -o -name "*.app.tar.gz" \) -type f 2>/dev/null | while read f; do echo "  $(ls -lh "$f")"; done || echo "  (none)"
          echo "Linux (.deb, .rpm):"
          find "$BUNDLE_DIR" \( -name "*.deb" -o -name "*.rpm" \) -type f 2>/dev/null | while read f; do echo "  $(ls -lh "$f")"; done || echo "  (none)"
          echo "Windows (.exe, .msi, .nsis.zip):"
          find "$BUNDLE_DIR" \( -name "*.exe" -o -name "*.msi" -o -name "*.nsis.zip" \) -type f 2>/dev/null | while read f; do echo "  $(ls -lh "$f")"; done || echo "  (none)"
          echo ""
          echo "========================================="

      # ─── 收集产物并重命名 ──────────────────────────────────────────────────
      # 命名规则: mcphub-desktop-{platform-tag}.{ext}
      # macOS: .dmg + .app.tar.gz（updater）+ .app.tar.gz.sig（updater 签名）
      - name: Collect artifacts (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          echo "========================================="
          echo "  Collecting macOS Artifacts"
          echo "========================================="
          mkdir -p dist-artifacts
          BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle"
          TAG="${{ matrix.platform-tag }}"
          echo "BUNDLE_DIR=$BUNDLE_DIR"
          echo "TAG=$TAG"
          echo ""

          # .dmg installer
          echo "[1/4] Looking for .dmg..."
          DMG=$(find "$BUNDLE_DIR" -name "*.dmg" ! -name "*.dmg.sig" | head -1)
          if [ -n "$DMG" ]; then
            cp "$DMG" "dist-artifacts/mcphub-desktop-${TAG}.dmg"
            echo "✅ Collected: mcphub-desktop-${TAG}.dmg ($(ls -lh "$DMG" | awk '{print $5}'))"
            echo "   Source: $DMG"
          else
            echo "⚠️  No .dmg file found"
          fi
          echo ""

          # .dmg.sig
          echo "[2/4] Looking for .dmg.sig..."
          DMG_SIG=$(find "$BUNDLE_DIR" -name "*.dmg.sig" | head -1)
          if [ -n "$DMG_SIG" ]; then
            cp "$DMG_SIG" "dist-artifacts/mcphub-desktop-${TAG}.dmg.sig"
            echo "✅ Collected: mcphub-desktop-${TAG}.dmg.sig ($(ls -lh "$DMG_SIG" | awk '{print $5}'))"
            echo "   Source: $DMG_SIG"
          else
            echo "⚠️  No .dmg.sig file found"
          fi
          echo ""

          # .app.tar.gz (updater payload)
          echo "[3/4] Looking for .app.tar.gz (updater payload)..."
          ATG=$(find "$BUNDLE_DIR" -name "*.app.tar.gz" ! -name "*.app.tar.gz.sig" | head -1)
          if [ -n "$ATG" ]; then
            cp "$ATG" "dist-artifacts/mcphub-desktop-${TAG}.app.tar.gz"
            echo "✅ Collected: mcphub-desktop-${TAG}.app.tar.gz ($(ls -lh "$ATG" | awk '{print $5}'))"
            echo "   Source: $ATG"
          else
            echo "⚠️  No .app.tar.gz file found (updater payload)"
          fi
          echo ""

          # .app.tar.gz.sig (updater signature)
          echo "[4/4] Looking for .app.tar.gz.sig (updater signature)..."
          ASIG=$(find "$BUNDLE_DIR" -name "*.app.tar.gz.sig" | head -1)
          if [ -n "$ASIG" ]; then
            cp "$ASIG" "dist-artifacts/mcphub-desktop-${TAG}.app.tar.gz.sig"
            echo "✅ Collected: mcphub-desktop-${TAG}.app.tar.gz.sig ($(ls -lh "$ASIG" | awk '{print $5}'))"
            echo "   Source: $ASIG"
          else
            echo "⚠️  No .app.tar.gz.sig file found (updater signature)"
          fi
          echo ""
          echo "=== dist-artifacts contents ==="
          ls -lh dist-artifacts/
          echo ""
          echo "========================================="

      # Linux: .deb + .rpm（AppImage 在 CI 中不可靠，已禁用；Linux 无自动更新）
      - name: Collect artifacts (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          echo "========================================="
          echo "  Collecting Linux Artifacts"
          echo "========================================="
          mkdir -p dist-artifacts
          BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle"
          TAG="${{ matrix.platform-tag }}"
          echo "BUNDLE_DIR=$BUNDLE_DIR"
          echo "TAG=$TAG"
          echo ""

          # .deb package
          echo "[1/4] Looking for .deb..."
          DEB=$(find "$BUNDLE_DIR" -name "*.deb" ! -name "*.deb.sig" | head -1)
          if [ -n "$DEB" ]; then
            cp "$DEB" "dist-artifacts/mcphub-desktop-${TAG}.deb"
            echo "✅ Collected: mcphub-desktop-${TAG}.deb ($(ls -lh "$DEB" | awk '{print $5}'))"
            echo "   Source: $DEB"
          else
            echo "⚠️  No .deb file found"
          fi
          echo ""

          # .deb.sig
          echo "[2/4] Looking for .deb.sig..."
          DEB_SIG=$(find "$BUNDLE_DIR" -name "*.deb.sig" | head -1)
          if [ -n "$DEB_SIG" ]; then
            cp "$DEB_SIG" "dist-artifacts/mcphub-desktop-${TAG}.deb.sig"
            echo "✅ Collected: mcphub-desktop-${TAG}.deb.sig ($(ls -lh "$DEB_SIG" | awk '{print $5}'))"
            echo "   Source: $DEB_SIG"
          else
            echo "⚠️  No .deb.sig file found"
          fi
          echo ""

          # .rpm package
          echo "[3/4] Looking for .rpm..."
          RPM=$(find "$BUNDLE_DIR" -name "*.rpm" ! -name "*.rpm.sig" | head -1)
          if [ -n "$RPM" ]; then
            cp "$RPM" "dist-artifacts/mcphub-desktop-${TAG}.rpm"
            echo "✅ Collected: mcphub-desktop-${TAG}.rpm ($(ls -lh "$RPM" | awk '{print $5}'))"
            echo "   Source: $RPM"
          else
            echo "⚠️  No .rpm file found"
          fi
          echo ""

          # .rpm.sig
          echo "[4/4] Looking for .rpm.sig..."
          RPM_SIG=$(find "$BUNDLE_DIR" -name "*.rpm.sig" | head -1)
          if [ -n "$RPM_SIG" ]; then
            cp "$RPM_SIG" "dist-artifacts/mcphub-desktop-${TAG}.rpm.sig"
            echo "✅ Collected: mcphub-desktop-${TAG}.rpm.sig ($(ls -lh "$RPM_SIG" | awk '{print $5}'))"
            echo "   Source: $RPM_SIG"
          else
            echo "⚠️  No .rpm.sig file found"
          fi
          echo ""
          echo "=== dist-artifacts contents ==="
          ls -lh dist-artifacts/
          echo ""
          echo "========================================="

      # Windows: NSIS 安装包 (.exe) + .exe.sig（updater 签名）+ .msi + .msi.sig
      # Tauri 2.x 的 Windows updater 直接签名 .exe 文件，不再生成 .nsis.zip
      - name: Collect artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "========================================="
          Write-Host "  Collecting Windows Artifacts"
          Write-Host "========================================="
          New-Item -ItemType Directory -Force -Path dist-artifacts | Out-Null
          $Tag = "${{ matrix.platform-tag }}"
          $BundleDir = "src-tauri/target/${{ matrix.target }}/release/bundle"
          Write-Host "BundleDir=$BundleDir"
          Write-Host "Tag=$Tag"
          Write-Host ""

          # .exe (NSIS installer) — 同时也是 updater payload
          Write-Host "[1/4] Looking for .exe (NSIS installer)..."
          $Exe = Get-ChildItem -Recurse -Path $BundleDir -Filter "*.exe" | Where-Object { $_.Name -notmatch '\.sig$' } | Select-Object -First 1
          if ($Exe) {
            Copy-Item $Exe.FullName "dist-artifacts/mcphub-desktop-$Tag.exe"
            Write-Host "✅ Collected: mcphub-desktop-$Tag.exe ($('{0:N1} MB' -f ($Exe.Length / 1MB)))"
            Write-Host "   Source: $($Exe.FullName)"
          } else {
            Write-Host "⚠️  No .exe file found"
          }
          Write-Host ""

          # .exe.sig (updater signature) — Tauri 2.x 直接签名 .exe
          Write-Host "[2/4] Looking for .exe.sig (updater signature)..."
          $ExeSig = Get-ChildItem -Recurse -Path $BundleDir -Filter "*.exe.sig" | Select-Object -First 1
          if ($ExeSig) {
            Copy-Item $ExeSig.FullName "dist-artifacts/mcphub-desktop-$Tag.exe.sig"
            Write-Host "✅ Collected: mcphub-desktop-$Tag.exe.sig ($('{0:N0} bytes' -f $ExeSig.Length))"
            Write-Host "   Source: $($ExeSig.FullName)"
            $bytes = [System.IO.File]::ReadAllBytes($ExeSig.FullName)
            $hex = ($bytes | ForEach-Object { $_.ToString("x2") }) -join ' '
            Write-Host "   Signature hex: $($hex.Substring(0, [Math]::Min(160, $hex.Length)))..."
          } else {
            Write-Host "⚠️  No .exe.sig file found (updater signature)"
          }
          Write-Host ""

          # .msi
          Write-Host "[3/4] Looking for .msi..."
          $Msi = Get-ChildItem -Recurse -Path $BundleDir -Filter "*.msi" | Where-Object { $_.Name -notmatch '\.sig$' } | Select-Object -First 1
          if ($Msi) {
            Copy-Item $Msi.FullName "dist-artifacts/mcphub-desktop-$Tag.msi"
            Write-Host "✅ Collected: mcphub-desktop-$Tag.msi ($('{0:N1} MB' -f ($Msi.Length / 1MB)))"
            Write-Host "   Source: $($Msi.FullName)"
          } else {
            Write-Host "⚠️  No .msi file found"
          }
          Write-Host ""

          # .msi.sig
          Write-Host "[4/4] Looking for .msi.sig..."
          $MsiSig = Get-ChildItem -Recurse -Path $BundleDir -Filter "*.msi.sig" | Select-Object -First 1
          if ($MsiSig) {
            Copy-Item $MsiSig.FullName "dist-artifacts/mcphub-desktop-$Tag.msi.sig"
            Write-Host "✅ Collected: mcphub-desktop-$Tag.msi.sig ($('{0:N0} bytes' -f $MsiSig.Length))"
            Write-Host "   Source: $($MsiSig.FullName)"
          } else {
            Write-Host "⚠️  No .msi.sig file found"
          }
          Write-Host ""
          Write-Host "=== dist-artifacts contents ==="
          Get-ChildItem dist-artifacts/ | Format-Table Name, @{L='Size(MB)';E={'{0:N1}' -f ($_.Length / 1MB)}}
          Write-Host "========================================="

      # ─── 上传产物到 Actions Artifacts ─────────────────────────────────────
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: mcphub-desktop-${{ matrix.target }}
          path: dist-artifacts/
          if-no-files-found: warn

      - name: Summary
        if: always()
        shell: bash
        run: |
          echo "========================================="
          echo "  Build Summary: ${{ matrix.platform-tag }}"
          echo "========================================="
          echo "Target: ${{ matrix.target }}"
          echo "Platform: ${{ matrix.platform }}"
          echo "Runner OS: ${{ runner.os }}"
          echo "Bundles: ${{ matrix.bundles }}"
          echo ""
          if [ -d "dist-artifacts" ]; then
            echo "=== Artifacts produced ==="
            ls -lh dist-artifacts/
          else
            echo "⚠️  No dist-artifacts directory found"
          fi
          echo ""
          SIG_COUNT=$(find src-tauri/target/${{ matrix.target }}/release/bundle -name "*.sig" -type f 2>/dev/null | wc -l | tr -d ' ')
          echo "=== Signature files (.sig) found: $SIG_COUNT ==="
          if [ "$SIG_COUNT" -eq 0 ]; then
            echo "⚠️  WARNING: No .sig files found. Auto-update will NOT work for this platform."
            echo "   For macOS: bundles must include 'app' (not just 'dmg')"
            echo "   For Windows: bundles must include 'nsis'"
          else
            echo "✅ .sig files present — updater will work"
          fi
          echo ""
          echo "========================================="

  # ─── 创建 GitHub Release + 生成 latest.json ──────────────────────────────
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # 从 tauri.conf.json 读取版本号
      - name: Read version from tauri.conf.json
        id: version
        shell: bash
        run: |
          echo "========================================="
          echo "  Reading version from tauri.conf.json"
          echo "========================================="
          echo "tauri.conf.json content:"
          cat src-tauri/tauri.conf.json
          echo ""
          VERSION=$(python3 -c "import json; print(json.load(open('src-tauri/tauri.conf.json'))['version'])")
          TAG="v${VERSION}"
          echo "VERSION=$VERSION"
          echo "TAG=$TAG"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "✅ Version: ${VERSION}, Tag: ${TAG}"
          echo "========================================="

      # 下载全部平台产物
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: all-artifacts
          pattern: mcphub-desktop-*
          merge-multiple: false

      - name: List all downloaded artifacts
        shell: bash
        run: |
          echo "========================================="
          echo "  All Downloaded Artifacts"
          echo "========================================="
          echo ""
          echo "=== Directory structure ==="
          find all-artifacts -type d | sort
          echo ""
          echo "=== All files ==="
          find all-artifacts -type f | sort
          echo ""
          echo "=== File sizes ==="
          find all-artifacts -type f -exec ls -lh {} \; | sort
          echo ""
          echo "=== .sig files (updater signatures) ==="
          SIG_COUNT=0
          for f in $(find all-artifacts -name "*.sig" -type f 2>/dev/null); do
            SIG_SIZE=$(ls -lh "$f" | awk '{print $5}')
            echo "  ✅ $f ($SIG_SIZE)"
            echo "     Hex dump:"
            xxd "$f" | head -5
            echo ""
            SIG_COUNT=$((SIG_COUNT + 1))
          done
          if [ "$SIG_COUNT" -eq 0 ]; then
            echo "  ❌ No .sig files found! This means updater signatures are missing."
            echo "     Auto-update will NOT work for any platform."
          else
            echo "  ✅ Total: $SIG_COUNT .sig file(s)"
          fi
          echo "========================================="

      # 从各平台 .sig 文件自动生成 latest.json
      - name: Generate latest.json
        shell: bash
        env:
          REPO: ${{ github.repository }}
        run: |
          echo "========================================="
          echo "  Generating latest.json"
          echo "========================================="
          python3 - <<'PYEOF'
          import os, json, glob
          from datetime import datetime, timezone

          repo     = os.environ['REPO']                 # e.g. skrstop/MCPHub-Desktop
          pub_date = datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ')

          print(f'REPO={repo}')
          print(f'pub_date={pub_date}')
          print()

          # 从 tauri.conf.json 读取版本号
          with open('src-tauri/tauri.conf.json', 'r', encoding='utf-8') as f:
              tauri_conf = json.load(f)
          version = tauri_conf['version']
          tag = f'v{version}'
          base_url = f"https://github.com/{repo}/releases/download/{tag}"

          print(f'✅ Version from tauri.conf.json: {version}')
          print(f'✅ Tag: {tag}')
          print(f'✅ Base URL: {base_url}')
          print()

          def classify(filename: str):
              """根据文件名推断 Tauri updater 平台 key
              Tauri 2.x 对所有 bundle 类型都会生成 .sig 文件
              """
              n = filename.lower()
              # macOS
              if '.app.tar.gz' in n or n.endswith('.dmg'):
                  return 'darwin-aarch64' if 'arm64' in n else 'darwin-x86_64'
              # Linux
              if 'appimage.tar.gz' in n or n.endswith('.deb') or n.endswith('.rpm'):
                  return 'linux-aarch64' if 'arm64' in n else 'linux-x86_64'
              # Windows: .nsis.zip（旧格式）或 .exe（新格式）或 .msi
              if 'nsis.zip' in n or n.endswith('.exe') or n.endswith('.msi'):
                  return 'windows-aarch64' if 'arm64' in n else 'windows-x86_64'
              return None

          platforms = {}
          sig_files = sorted(glob.glob('all-artifacts/**/*.sig', recursive=True))
          print(f'🔍 Found {len(sig_files)} .sig file(s):')
          for sig_path in sig_files:
              print(f'  {sig_path}')
          print()

          # Also check for corresponding payload files
          for sig_path in sig_files:
              payload_path = sig_path[:-4]  # Remove .sig extension
              if os.path.exists(payload_path):
                  payload_size = os.path.getsize(payload_path)
                  print(f'  Payload: {payload_path} ({payload_size} bytes)')
              else:
                  print(f'  ⚠️  Payload not found: {payload_path}')
          print()

          for sig_path in sig_files:
              # 去掉末尾 .sig 得到资源文件名
              asset_name = os.path.basename(sig_path[:-4])
              platform   = classify(asset_name)
              if platform is None:
                  print(f'  [skip] {asset_name} — 无法识别平台')
                  continue
              sig_content = open(sig_path).read().strip()
              if not sig_content:
                  print(f'  [warn] {asset_name}.sig is empty, skipping')
                  continue
              # GitHub releases 会把文件名中的空格替换为 '.' 生成下载 URL
              url_name = asset_name.replace(' ', '.')
              platforms[platform] = {
                  'signature': sig_content,
                  'url': f"{base_url}/{url_name}",
              }
              print(f'  [ok] {platform} -> {url_name}')
              print(f'       signature length: {len(sig_content)} chars')
              print(f'       signature preview: {sig_content[:60]}...')
          print()

          if not platforms:
              print('❌ CRITICAL: 未找到任何有效的 .sig 文件，latest.json 的 platforms 为空！')
              print('   可能原因：')
              print('   1. TAURI_SIGNING_PRIVATE_KEY 未正确设置（检查 Decode signing key 步骤）')
              print('   2. Tauri 构建未生成 updater 产物（检查 List build artifacts 步骤）')
              print('   3. .sig 文件为空（检查签名密钥是否与公钥匹配）')
              print('   4. macOS bundles 未包含 app 目标（需要 bundles: app,dmg 而非仅 dmg）')
              print('   5. 构建矩阵中某些平台被注释掉（检查 release.yml）')
          else:
              print(f'✅ Found {len(platforms)} platform(s) with valid signatures:')
              for p in platforms:
                  print(f'   - {p}: {platforms[p]["url"]}')
          print()

          # 读取版本更新说明
          notes_file = f'doc/upgrade/{version}.md'
          if os.path.exists(notes_file):
              with open(notes_file, 'r', encoding='utf-8') as f:
                  notes = f.read().strip()
              print(f'✅ Loaded release notes from {notes_file}')
          else:
              notes = f'MCPHub Desktop {version}'
              print(f'⚠️  No release notes found at {notes_file}, using default')

          data = {
              'version': version,
              'notes': notes,
              'pub_date': pub_date,
              'platforms': platforms,
          }

          os.makedirs('release-meta', exist_ok=True)
          out_path = 'release-meta/latest.json'
          with open(out_path, 'w', encoding='utf-8') as f:
              json.dump(data, f, indent=2, ensure_ascii=False)

          print(f'\n📄 Generated latest.json ({len(json.dumps(data, ensure_ascii=False))} bytes):')
          print(json.dumps(data, indent=2, ensure_ascii=False))
          PYEOF

      # 验证生成结果
      - name: Show latest.json
        shell: bash
        run: |
          echo "========================================="
          echo "  latest.json Content"
          echo "========================================="
          cat release-meta/latest.json
          echo ""
          echo "========================================="
          echo "  Validation"
          echo "========================================="
          # Check platforms count
          PLATFORM_COUNT=$(python3 -c "import json; d=json.load(open('release-meta/latest.json')); print(len(d.get('platforms', {})))")
          echo "Platforms count: $PLATFORM_COUNT"
          if [ "$PLATFORM_COUNT" -eq 0 ]; then
            echo "❌ CRITICAL: No platforms in latest.json! Auto-update will NOT work."
            echo "   Check the 'Generate latest.json' step above for details."
          else
            echo "✅ latest.json has $PLATFORM_COUNT platform(s)"
            echo ""
            echo "=== Platform details ==="
            python3 -c "
          import json
          d = json.load(open('release-meta/latest.json'))
          for p, info in d.get('platforms', {}).items():
              print(f'  {p}:')
              print(f'    url: {info[\"url\"]}')
              print(f'    signature: {info[\"signature\"][:60]}...')
          "
          fi
          echo ""
          echo "========================================="

      # 创建 draft Release，上传全部产物 + latest.json
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: MCPHub Desktop ${{ steps.version.outputs.tag }}
          draft: true
          prerelease: false
          generate_release_notes: true
          files: |
            all-artifacts/**/*
            release-meta/latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
