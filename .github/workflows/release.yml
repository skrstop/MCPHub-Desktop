name: Release

# 触发条件：推送 v* 格式的 tag 或手动触发
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# 允许写入 release
permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    env:
      PYTHONIOENCODING: utf-8
    strategy:
      fail-fast: false
      matrix:
        include:
#          # macOS Apple Silicon (arm64) — native on macos-14
#          # ⚠️ bundles 必须包含 app 才能生成 updater 产物（.app.tar.gz + .app.tar.gz.sig）
#          # 仅 dmg 不会生成 updater 产物！
#          - platform: macos-14
#            target: aarch64-apple-darwin
#            runtime-arch: arm64
#            bundles: app,dmg
#            platform-tag: macos-arm64
#
#          # macOS Intel (x64) — cross-compile on ARM64 runner
#          # ⚠️ bundles 必须包含 app 才能生成 updater 产物
#          - platform: macos-14
#            target: x86_64-apple-darwin
#            runtime-arch: x64
#            bundles: app,dmg
#            platform-tag: macos-x64
#
#          # Linux x64 — native
#          # Note: AppImage bundling (linuxdeploy) is unreliable in CI, only build deb/rpm
#          # Linux 不支持自动更新（无 AppImage），所以不需要 updater 产物
#          - platform: ubuntu-22.04
#            target: x86_64-unknown-linux-gnu
#            runtime-arch: x64
#            bundles: deb,rpm
#            platform-tag: linux-x64
#
#          # Linux arm64 — GitHub hosted ARM runner
#          - platform: ubuntu-22.04-arm
#            target: aarch64-unknown-linux-gnu
#            runtime-arch: arm64
#            bundles: deb,rpm
#            platform-tag: linux-arm64

          # Windows x64 — native
          # nsis 目标会生成 .nsis.zip + .nsis.zip.sig（updater 产物）
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            runtime-arch: x64
            bundles: nsis,msi
            platform-tag: windows-x64

#          # Windows arm64 — cross-compile on x64 runner
#          - platform: windows-latest
#            target: aarch64-pc-windows-msvc
#            runtime-arch: arm64
#            bundles: nsis,msi
#            platform-tag: windows-arm64

    runs-on: ${{ matrix.platform }}

    steps:
      # ─── 检出代码 ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v6

      - name: Print build info
        shell: bash
        run: |
          echo "========================================="
          echo "  Build Configuration"
          echo "========================================="
          echo "Platform:      ${{ matrix.platform }}"
          echo "Target:        ${{ matrix.target }}"
          echo "Runtime arch:  ${{ matrix.runtime-arch }}"
          echo "Bundles:       ${{ matrix.bundles }}"
          echo "Platform tag:  ${{ matrix.platform-tag }}"
          echo "Runner OS:      ${{ runner.os }}"
          echo "Runner arch:   ${{ runner.arch }}"
          echo "Event:         ${{ github.event_name }}"
          echo "Ref:           ${{ github.ref }}"
          echo "SHA:           ${{ github.sha }}"
          echo "========================================="

      # ─── 安装 Node.js ──────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Print Node.js info
        shell: bash
        run: |
          echo "Node.js version: $(node --version)"
          echo "npm version:     $(npm --version)"

      # ─── 安装 Rust + 目标 triple ───────────────────────────────────────────
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Print Rust info
        shell: bash
        run: |
          echo "Rust version:"
          rustup show active-toolchain
          echo "Installed targets:"
          rustup target list --installed
          echo "Cargo version: $(cargo --version)"

      # ─── Windows arm64 交叉编译工具链 ─────────────────────────────────────
      - name: Install Windows ARM64 MSVC toolchain
        if: matrix.target == 'aarch64-pc-windows-msvc'
        run: |
          rustup target add aarch64-pc-windows-msvc
          echo "Added aarch64-pc-windows-msvc target"

      # ─── Rust 构建缓存 ─────────────────────────────────────────────────────
      - name: Cache Rust
        uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: src-tauri
          key: ${{ matrix.target }}

      # ─── Linux 系统依赖 ────────────────────────────────────────────────────
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          echo "Installing Linux system dependencies..."
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            patchelf \
            libssl-dev \
            pkg-config \
            file \
            libfuse2 \
            xdg-utils
          echo "✅ Linux dependencies installed"

      # ─── 安装根目录依赖（tauri-cli）────────────────────────────────────────
      - name: Install root deps
        run: |
          echo "Installing root npm dependencies..."
          npm install
          echo "✅ Root deps installed"

      # ─── 安装前端依赖 ──────────────────────────────────────────────────────
      - name: Install frontend deps
        run: |
          echo "Installing frontend npm dependencies..."
          cd frontend && npm install
          echo "✅ Frontend deps installed"

      # ─── 下载 bundled runtimes（Unix）─────────────────────────────────────
      - name: Download bundled runtimes (Unix)
        if: runner.os != 'Windows'
        run: |
          echo "Downloading bundled runtimes for Unix (TARGET_ARCH=${{ matrix.runtime-arch }})..."
          bash scripts/download-runtimes.sh
          echo ""
          echo "=== Runtime files ==="
          ls -la src-tauri/runtimes/ 2>/dev/null || echo "No runtimes directory"
          ls -la src-tauri/runtimes/node/bin/ 2>/dev/null || echo "No node binary"
          ls -la src-tauri/runtimes/uv/ 2>/dev/null || echo "No uv binary"
        env:
          TARGET_ARCH: ${{ matrix.runtime-arch }}

      # ─── 下载 bundled runtimes（Windows）──────────────────────────────────
      - name: Download bundled runtimes (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "Downloading bundled runtimes for Windows (TargetArch=${{ matrix.runtime-arch }})..."
          .\scripts\download-runtimes.ps1 -TargetArch "${{ matrix.runtime-arch }}"
          Write-Host ""
          Write-Host "=== Runtime files ==="
          Get-ChildItem -Path src-tauri\runtimes -Recurse -Depth 2 | Format-Table Name, Length

      # ─── 解码签名私钥 ─────────────────────────────────────────────────────
      # mcphub.key 文件以 base64 编码存储，Tauri signer 需要原始格式（以 "untrusted comment:" 开头）
      # 关键：解码后必须 strip 尾部空白/换行，否则 Tauri signer 解析失败导致 .sig 不生成
      # ⚠️ Windows 兼容：使用两步方案避免 GITHUB_ENV heredoc 换行符问题
      #   1. Python 将密钥写入临时文件（newline='\n' 强制 Unix 换行）
      #   2. Bash 从文件读取密钥并设置 GITHUB_ENV heredoc
      - name: Decode signing key
        shell: bash
        run: |
          echo "========================================="
          echo "  Decoding signing key"
          echo "========================================="
          KEY_FILE="src-tauri/updater/mcphub.key"
          if [ ! -f "$KEY_FILE" ]; then
            echo "❌ ERROR: Key file not found: $KEY_FILE"
            exit 1
          fi
          KEY_SIZE=$(wc -c < "$KEY_FILE")
          echo "Key file size: $KEY_SIZE bytes"
          python3 << 'PYEOF'
          import base64, os, sys
          key_file = 'src-tauri/updater/mcphub.key'
          key_content = open(key_file, 'r', encoding='utf-8').read().strip()
          print(f"Key file content length: {len(key_content)} chars")
          print(f"Key starts with: {key_content[:30]}...")
          # 如果密钥已经是原始格式（以 "untrusted comment:" 开头），直接使用
          # 否则从 base64 解码
          if key_content.startswith('untrusted comment:'):
              key_raw = key_content
              print("Key is already in raw format (starts with 'untrusted comment:')")
          else:
              print("Key is base64 encoded, decoding...")
              key_raw = base64.b64decode(key_content).decode('utf-8')
              print(f"Decoded key length: {len(key_raw)} chars")
          # ⚠️ 关键修复：strip 尾部空白/换行，确保密钥格式干净
          # 之前缺少此步骤导致 TAURI_SIGNING_PRIVATE_KEY 末尾有多余空行，
          # Tauri signer 无法解析，.sig 文件不会生成，latest.json platforms 为空
          key_raw = key_raw.strip()
          # ⚠️ 移除所有 \r 字符，避免 Windows 换行符问题
          key_raw = key_raw.replace('\r', '')
          print(f"After strip: key length = {len(key_raw)} chars")
          print(f"First line: {key_raw.split(chr(10))[0]}")
          print(f"Number of lines: {len(key_raw.split(chr(10)))}")
          # ⚠️ 写入临时文件而非直接写 GITHUB_ENV
          # Windows 上 Python open() 文本模式会将 \n 写为 \r\n，破坏 heredoc 语法
          # 使用 newline='\n' 强制 Unix 换行符
          with open('signing_key.txt', 'w', encoding='utf-8', newline='\n') as f:
              f.write(key_raw)
          print("✅ Signing key written to signing_key.txt")
          PYEOF

      - name: Set signing key environment variable
        shell: bash
        run: |
          # 从文件读取密钥并设置为环境变量
          # ⚠️ 使用 printf 而非 echo，避免 Windows 上 echo 解释转义字符或添加 \r
          KEY_RAW=$(cat signing_key.txt)
          echo "Key read from file, length: ${#KEY_RAW} chars"
          echo "First line: $(echo "$KEY_RAW" | head -1)"
          echo "Number of lines: $(echo "$KEY_RAW" | wc -l)"
          {
            echo "TAURI_SIGNING_PRIVATE_KEY<<TAURI_KEY_EOF"
            printf '%s\n' "$KEY_RAW"
            echo "TAURI_KEY_EOF"
          } >> $GITHUB_ENV

      # ─── 验证签名密钥已正确设置 ──────────────────────────────────────────
      - name: Verify signing key
        shell: bash
        run: |
          echo "========================================="
          echo "  Verifying signing key"
          echo "========================================="
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "❌ ERROR: TAURI_SIGNING_PRIVATE_KEY is not set!"
            exit 1
          fi
          KEY_LEN=${#TAURI_SIGNING_PRIVATE_KEY}
          FIRST_LINE=$(echo "$TAURI_SIGNING_PRIVATE_KEY" | head -1)
          LINE_COUNT=$(echo "$TAURI_SIGNING_PRIVATE_KEY" | wc -l)
          echo "✅ TAURI_SIGNING_PRIVATE_KEY is set"
          echo "   Key length: $KEY_LEN chars"
          echo "   Number of lines: $LINE_COUNT"
          echo "   First line: $FIRST_LINE"
          # 验证密钥格式：必须以 "untrusted comment:" 开头
          if [[ "$FIRST_LINE" != untrusted\ comment:* ]]; then
            echo "❌ ERROR: Signing key does not start with 'untrusted comment:'"
            echo "   This means the key format is invalid and Tauri signer will fail."
            echo "   First 50 chars: ${FIRST_LINE:0:50}"
            exit 1
          fi
          echo "✅ Signing key format looks valid (starts with 'untrusted comment:')"
          echo ""
          echo "Checking pubkey in tauri.conf.json..."
          PUBKEY=$(python3 -c "import json; print(json.load(open('src-tauri/tauri.conf.json'))['plugins']['updater']['pubkey'])")
          echo "   Pubkey: ${PUBKEY:0:50}..."
          echo "✅ Pubkey found in tauri.conf.json"
          echo ""
          echo "Checking createUpdaterArtifacts in tauri.conf.json..."
          UPDATER_ARTIFACTS=$(python3 -c "import json; print(json.load(open('src-tauri/tauri.conf.json'))['bundle']['createUpdaterArtifacts'])")
          echo "   createUpdaterArtifacts: $UPDATER_ARTIFACTS"
          if [ "$UPDATER_ARTIFACTS" != "True" ]; then
            echo "❌ ERROR: createUpdaterArtifacts is not True! Updater artifacts will NOT be generated."
            echo "   Set bundle.createUpdaterArtifacts to true in src-tauri/tauri.conf.json"
            exit 1
          fi
          echo "✅ createUpdaterArtifacts is True — updater artifacts will be generated"

      # ─── 编译 Tauri 应用 ───────────────────────────────────────────────────
      - name: Build Tauri app
        run: |
          echo "========================================="
          echo "  Building Tauri app"
          echo "========================================="
          echo "Target:  ${{ matrix.target }}"
          echo "Bundles: ${{ matrix.bundles }}"
          echo ""
          echo "⚠️  Note: macOS bundles MUST include 'app' target to generate updater artifacts."
          echo "   'dmg' alone does NOT generate .app.tar.gz / .app.tar.gz.sig"
          echo "   Windows 'nsis' target generates .nsis.zip / .nsis.zip.sig"
          echo ""
          npm run tauri build -- --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}
        env:
          # TAURI_SIGNING_PRIVATE_KEY 已通过 GITHUB_ENV 设置（由上一步解码）
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
          # Cargo 网络重试（应对 crates.io 连接不稳定）
          CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
          CARGO_NET_RETRY: 10
          CARGO_HTTP_TIMEOUT: 120

      # ─── 调试：列出构建产物 ─────────────────────────────────────────────────
      - name: List build artifacts
        if: always()
        shell: bash
        run: |
          echo "========================================="
          echo "  Build artifacts for ${{ matrix.platform-tag }}"
          echo "========================================="
          BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle"
          if [ -d "$BUNDLE_DIR" ]; then
            echo "Bundle directory: $BUNDLE_DIR"
            echo ""
            echo "=== All files in bundle directory ==="
            find "$BUNDLE_DIR" -type f | sort
            echo ""
            echo "=== File sizes ==="
            find "$BUNDLE_DIR" -type f -exec ls -lh {} \; | sort
          else
            echo "⚠️  Bundle directory not found: $BUNDLE_DIR"
            echo ""
            echo "Checking if target/release directory exists..."
            if [ -d "src-tauri/target/${{ matrix.target }}/release" ]; then
              echo "Release directory exists, listing top-level:"
              ls -la "src-tauri/target/${{ matrix.target }}/release/" | head -20
            else
              echo "Release directory not found either"
            fi
          fi
          echo ""
          echo "=== .sig files (updater signatures) ==="
          SIG_COUNT=0
          if [ -d "$BUNDLE_DIR" ]; then
            while IFS= read -r f; do
              SIG_SIZE=$(ls -lh "$f" | awk '{print $5}')
              SIG_CONTENT=$(head -c 100 "$f")
              echo "  ✅ $f ($SIG_SIZE)"
              echo "     Content preview: ${SIG_CONTENT:0:80}..."
              SIG_COUNT=$((SIG_COUNT + 1))
            done < <(find "$BUNDLE_DIR" -name "*.sig" -type f 2>/dev/null)
          fi
          if [ "$SIG_COUNT" -eq 0 ]; then
            echo "  ⚠️  No .sig files found! Updater artifacts were NOT generated."
            echo "  This usually means TAURI_SIGNING_PRIVATE_KEY was not set correctly,"
            echo "  OR the bundles config does not include an updater-enabled target."
            echo ""
            echo "  ⚠️  macOS: bundles must include 'app' (not just 'dmg')"
            echo "  ⚠️  Windows: bundles must include 'nsis'"
            echo "  ⚠️  Linux: no updater support (deb/rpm only)"
          else
            echo "  ✅ Found $SIG_COUNT .sig file(s)"
          fi
          echo ""
          echo "=== Platform-specific files ==="
          echo "macOS (.dmg, .app.tar.gz):"
          find "$BUNDLE_DIR" \( -name "*.dmg" -o -name "*.app.tar.gz" \) -type f 2>/dev/null | while read f; do echo "  $(ls -lh "$f")"; done
          echo "Linux (.deb, .rpm):"
          find "$BUNDLE_DIR" \( -name "*.deb" -o -name "*.rpm" \) -type f 2>/dev/null | while read f; do echo "  $(ls -lh "$f")"; done
          echo "Windows (.exe, .msi, .nsis.zip):"
          find "$BUNDLE_DIR" \( -name "*.exe" -o -name "*.msi" -o -name "*.nsis.zip" \) -type f 2>/dev/null | while read f; do echo "  $(ls -lh "$f")"; done

      # ─── 收集产物并重命名 ──────────────────────────────────────────────────
      # 命名规则: mcphub-desktop-{platform-tag}.{ext}
      # macOS: .dmg + .app.tar.gz（updater）+ .app.tar.gz.sig（updater 签名）
      - name: Collect artifacts (macOS)
        if: runner.os == 'macOS'
        run: |
          echo "========================================="
          echo "  Collecting macOS artifacts"
          echo "========================================="
          mkdir -p dist-artifacts
          BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle"
          TAG="${{ matrix.platform-tag }}"
          # .dmg installer
          DMG=$(find "$BUNDLE_DIR" -name "*.dmg" | head -1)
          if [ -n "$DMG" ]; then
            cp "$DMG" "dist-artifacts/mcphub-desktop-${TAG}.dmg"
            echo "✅ Collected: mcphub-desktop-${TAG}.dmg ($(ls -lh "$DMG" | awk '{print $5}'))"
          else
            echo "⚠️  No .dmg file found"
          fi
          # .app.tar.gz (updater payload)
          ATG=$(find "$BUNDLE_DIR" -name "*.app.tar.gz" ! -name "*.app.tar.gz.sig" | head -1)
          if [ -n "$ATG" ]; then
            cp "$ATG" "dist-artifacts/mcphub-desktop-${TAG}.app.tar.gz"
            echo "✅ Collected: mcphub-desktop-${TAG}.app.tar.gz ($(ls -lh "$ATG" | awk '{print $5}'))"
          else
            echo "⚠️  No .app.tar.gz file found (updater payload)"
            echo "   ⚠️  This means bundles config may not include 'app' target!"
            echo "   Fix: set bundles to 'app,dmg' instead of just 'dmg'"
          fi
          # .app.tar.gz.sig (updater signature)
          ASIG=$(find "$BUNDLE_DIR" -name "*.app.tar.gz.sig" | head -1)
          if [ -n "$ASIG" ]; then
            cp "$ASIG" "dist-artifacts/mcphub-desktop-${TAG}.app.tar.gz.sig"
            echo "✅ Collected: mcphub-desktop-${TAG}.app.tar.gz.sig ($(ls -lh "$ASIG" | awk '{print $5}'))"
            echo "   Signature content: $(head -c 80 "$ASIG")..."
          else
            echo "⚠️  No .app.tar.gz.sig file found (updater signature)"
          fi
          echo ""
          echo "=== dist-artifacts contents ==="
          ls -lh dist-artifacts/

      # Linux: .deb + .rpm（AppImage 在 CI 中不可靠，已禁用；Linux 无自动更新）
      - name: Collect artifacts (Linux)
        if: runner.os == 'Linux'
        run: |
          echo "========================================="
          echo "  Collecting Linux artifacts"
          echo "========================================="
          mkdir -p dist-artifacts
          BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle"
          TAG="${{ matrix.platform-tag }}"
          # .deb package
          DEB=$(find "$BUNDLE_DIR" -name "*.deb" | head -1)
          if [ -n "$DEB" ]; then
            cp "$DEB" "dist-artifacts/mcphub-desktop-${TAG}.deb"
            echo "✅ Collected: mcphub-desktop-${TAG}.deb ($(ls -lh "$DEB" | awk '{print $5}'))"
          else
            echo "⚠️  No .deb file found"
          fi
          # .rpm package
          RPM=$(find "$BUNDLE_DIR" -name "*.rpm" | head -1)
          if [ -n "$RPM" ]; then
            cp "$RPM" "dist-artifacts/mcphub-desktop-${TAG}.rpm"
            echo "✅ Collected: mcphub-desktop-${TAG}.rpm ($(ls -lh "$RPM" | awk '{print $5}'))"
          else
            echo "⚠️  No .rpm file found"
          fi
          echo ""
          echo "=== dist-artifacts contents ==="
          ls -lh dist-artifacts/

      # Windows: NSIS 安装包 (.exe) + .nsis.zip + .nsis.zip.sig（updater 专用）
      - name: Collect artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "========================================="
          Write-Host "  Collecting Windows artifacts"
          Write-Host "========================================="
          New-Item -ItemType Directory -Force -Path dist-artifacts | Out-Null
          $Tag = "${{ matrix.platform-tag }}"
          $BundleDir = "src-tauri/target/${{ matrix.target }}/release/bundle"
          # .exe (NSIS installer)
          $Exe = Get-ChildItem -Recurse -Path $BundleDir -Filter "*.exe" | Select-Object -First 1
          if ($Exe) { 
            Copy-Item $Exe.FullName "dist-artifacts/mcphub-desktop-$Tag.exe"
            Write-Host "✅ Collected: mcphub-desktop-$Tag.exe ($('{0:N1} MB' -f ($Exe.Length / 1MB)))"
          } else {
            Write-Host "⚠️  No .exe file found"
          }
          # .msi
          $Msi = Get-ChildItem -Recurse -Path $BundleDir -Filter "*.msi" | Select-Object -First 1
          if ($Msi) { 
            Copy-Item $Msi.FullName "dist-artifacts/mcphub-desktop-$Tag.msi"
            Write-Host "✅ Collected: mcphub-desktop-$Tag.msi ($('{0:N1} MB' -f ($Msi.Length / 1MB)))"
          } else {
            Write-Host "⚠️  No .msi file found"
          }
          # .nsis.zip (updater payload)
          $Nsis = Get-ChildItem -Recurse -Path $BundleDir -Filter "*.nsis.zip" | Where-Object { $_.Name -notmatch '\.sig$' } | Select-Object -First 1
          if ($Nsis) { 
            Copy-Item $Nsis.FullName "dist-artifacts/mcphub-desktop-$Tag.nsis.zip"
            Write-Host "✅ Collected: mcphub-desktop-$Tag.nsis.zip ($('{0:N1} MB' -f ($Nsis.Length / 1MB)))"
          } else {
            Write-Host "⚠️  No .nsis.zip file found (updater payload)"
          }
          # .nsis.zip.sig (updater signature)
          $Nsig = Get-ChildItem -Recurse -Path $BundleDir -Filter "*.nsis.zip.sig" | Select-Object -First 1
          if ($Nsig) { 
            Copy-Item $Nsig.FullName "dist-artifacts/mcphub-desktop-$Tag.nsis.zip.sig"
            Write-Host "✅ Collected: mcphub-desktop-$Tag.nsis.zip.sig ($('{0:N0} bytes' -f $Nsig.Length))"
            $sigContent = Get-Content $Nsig.FullName -Raw
            Write-Host "   Signature preview: $($sigContent.Substring(0, [Math]::Min(80, $sigContent.Length)))..."
          } else {
            Write-Host "⚠️  No .nsis.zip.sig file found (updater signature)"
          }
          Write-Host ""
          Write-Host "=== dist-artifacts contents ==="
          Get-ChildItem dist-artifacts/ | Format-Table Name, @{L='Size(MB)';E={'{0:N1}' -f ($_.Length / 1MB)}}

      # ─── 上传产物到 Actions Artifacts ─────────────────────────────────────
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: mcphub-desktop-${{ matrix.target }}
          path: dist-artifacts/
          if-no-files-found: warn

      - name: Summary
        if: always()
        shell: bash
        run: |
          echo "========================================="
          echo "  Build Summary: ${{ matrix.platform-tag }}"
          echo "========================================="
          echo "Target: ${{ matrix.target }}"
          echo "Platform: ${{ matrix.platform }}"
          echo "Runner OS: ${{ runner.os }}"
          echo "Bundles: ${{ matrix.bundles }}"
          echo ""
          if [ -d "dist-artifacts" ]; then
            echo "Artifacts produced:"
            ls -lh dist-artifacts/ 2>/dev/null || echo "  (empty)"
          else
            echo "⚠️  No dist-artifacts directory found"
          fi
          echo ""
          SIG_COUNT=$(find src-tauri/target/${{ matrix.target }}/release/bundle -name "*.sig" -type f 2>/dev/null | wc -l | tr -d ' ')
          echo "Signature files (.sig) found: $SIG_COUNT"
          if [ "$SIG_COUNT" -eq 0 ]; then
            echo "⚠️  WARNING: No .sig files found. Auto-update will NOT work for this platform."
            echo "   For macOS: bundles must include 'app' (not just 'dmg')"
            echo "   For Windows: bundles must include 'nsis'"
          fi

  # ─── 创建 GitHub Release + 生成 latest.json ──────────────────────────────
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # 从 tauri.conf.json 读取版本号
      - name: Read version from tauri.conf.json
        id: version
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('src-tauri/tauri.conf.json'))['version'])")
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "✅ Version: ${VERSION}, Tag: ${TAG}"

      # 下载全部平台产物
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: all-artifacts
          pattern: mcphub-desktop-*
          merge-multiple: false

      - name: List all downloaded artifacts
        run: |
          echo "========================================="
          echo "  All downloaded artifacts"
          echo "========================================="
          echo ""
          echo "=== Directory structure ==="
          find all-artifacts -type d | sort
          echo ""
          echo "=== All files ==="
          find all-artifacts -type f | sort
          echo ""
          echo "=== File sizes ==="
          find all-artifacts -type f -exec ls -lh {} \; | sort
          echo ""
          echo "=== .sig files (updater signatures) ==="
          SIG_COUNT=0
          for f in $(find all-artifacts -name "*.sig" -type f 2>/dev/null); do
            SIG_SIZE=$(ls -lh "$f" | awk '{print $5}')
            SIG_CONTENT=$(head -c 100 "$f")
            echo "  ✅ $f ($SIG_SIZE)"
            echo "     Content preview: ${SIG_CONTENT:0:80}..."
            SIG_COUNT=$((SIG_COUNT + 1))
          done
          if [ "$SIG_COUNT" -eq 0 ]; then
            echo "  ❌ No .sig files found! This means updater signatures are missing."
            echo "     Auto-update will NOT work for any platform."
          else
            echo "  ✅ Total: $SIG_COUNT .sig file(s)"
          fi

      # 从各平台 .sig 文件自动生成 latest.json
      - name: Generate latest.json
        env:
          REPO: ${{ github.repository }}
        run: |
          echo "========================================="
          echo "  Generating latest.json"
          echo "========================================="
          python3 - <<'PYEOF'
          import os, json, glob
          from datetime import datetime, timezone

          repo     = os.environ['REPO']                 # e.g. skrstop/MCPHub-Desktop
          pub_date = datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ')

          # 从 tauri.conf.json 读取版本号
          with open('src-tauri/tauri.conf.json', 'r', encoding='utf-8') as f:
              tauri_conf = json.load(f)
          version = tauri_conf['version']
          tag = f'v{version}'
          base_url = f"https://github.com/{repo}/releases/download/{tag}"

          print(f'✅ Version from tauri.conf.json: {version}')
          print(f'✅ Tag: {tag}')
          print(f'✅ Base URL: {base_url}')

          def classify(filename: str):
              """根据文件名推断 Tauri updater 平台 key
              文件名格式: mcphub-desktop-{platform-tag}.{ext}
              platform-tag: macos-arm64, macos-x64, linux-x64, linux-arm64, windows-x64, windows-arm64
              """
              n = filename.lower()
              if '.app.tar.gz' in n:
                  return 'darwin-aarch64' if 'arm64' in n else 'darwin-x86_64'
              if 'appimage.tar.gz' in n:
                  return 'linux-aarch64' if 'arm64' in n else 'linux-x86_64'
              if 'nsis.zip' in n:
                  return 'windows-aarch64' if 'arm64' in n else 'windows-x86_64'
              return None

          platforms = {}
          sig_files = sorted(glob.glob('all-artifacts/**/*.sig', recursive=True))
          print(f'\n🔍 Found {len(sig_files)} .sig file(s):')
          for sig_path in sig_files:
              print(f'  {sig_path}')

          # Also check for corresponding payload files
          for sig_path in sig_files:
              payload_path = sig_path[:-4]  # Remove .sig extension
              if os.path.exists(payload_path):
                  payload_size = os.path.getsize(payload_path)
                  print(f'  Payload: {payload_path} ({payload_size} bytes)')
              else:
                  print(f'  ⚠️  Payload not found: {payload_path}')

          for sig_path in sig_files:
              # 去掉末尾 .sig 得到资源文件名
              asset_name = os.path.basename(sig_path[:-4])
              platform   = classify(asset_name)
              if platform is None:
                  print(f'  [skip] {asset_name} — 无法识别平台')
                  continue
              sig_content = open(sig_path).read().strip()
              if not sig_content:
                  print(f'  [warn] {asset_name}.sig is empty, skipping')
                  continue
              # GitHub releases 会把文件名中的空格替换为 '.' 生成下载 URL
              url_name = asset_name.replace(' ', '.')
              platforms[platform] = {
                  'signature': sig_content,
                  'url': f"{base_url}/{url_name}",
              }
              print(f'  [ok] {platform} -> {url_name}')
              print(f'       signature length: {len(sig_content)} chars')
              print(f'       signature preview: {sig_content[:60]}...')

          if not platforms:
              print('\n❌ CRITICAL: 未找到任何有效的 .sig 文件，latest.json 的 platforms 为空！')
              print('   可能原因：')
              print('   1. TAURI_SIGNING_PRIVATE_KEY 未正确设置（检查 Decode signing key 步骤）')
              print('   2. Tauri 构建未生成 updater 产物（检查 List build artifacts 步骤）')
              print('   3. .sig 文件为空（检查签名密钥是否与公钥匹配）')
              print('   4. macOS bundles 未包含 app 目标（需要 bundles: app,dmg 而非仅 dmg）')
              print('   5. 构建矩阵中某些平台被注释掉（检查 release.yml）')
          else:
              print(f'\n✅ Found {len(platforms)} platform(s) with valid signatures:')
              for p in platforms:
                  print(f'   - {p}: {platforms[p]["url"]}')

          # 读取版本更新说明
          notes_file = f'doc/upgrade/{version}.md'
          if os.path.exists(notes_file):
              with open(notes_file, 'r', encoding='utf-8') as f:
                  notes = f.read().strip()
              print(f'✅ Loaded release notes from {notes_file}')
          else:
              notes = f'MCPHub Desktop {version}'
              print(f'⚠️  No release notes found at {notes_file}, using default')

          data = {
              'version': version,
              'notes': notes,
              'pub_date': pub_date,
              'platforms': platforms,
          }

          os.makedirs('release-meta', exist_ok=True)
          out_path = 'release-meta/latest.json'
          with open(out_path, 'w', encoding='utf-8') as f:
              json.dump(data, f, indent=2, ensure_ascii=False)

          print(f'\n📄 Generated latest.json ({len(json.dumps(data, ensure_ascii=False))} bytes):')
          print(json.dumps(data, indent=2, ensure_ascii=False))
          PYEOF

      # 验证生成结果
      - name: Show latest.json
        run: |
          echo "========================================="
          echo "  latest.json content"
          echo "========================================="
          cat release-meta/latest.json
          echo ""
          echo "========================================="
          echo "  Validation"
          echo "========================================="
          # Check platforms count
          PLATFORM_COUNT=$(python3 -c "import json; d=json.load(open('release-meta/latest.json')); print(len(d.get('platforms', {})))")
          echo "Platforms count: $PLATFORM_COUNT"
          if [ "$PLATFORM_COUNT" -eq 0 ]; then
            echo "❌ CRITICAL: No platforms in latest.json! Auto-update will NOT work."
            echo "   Check the 'Generate latest.json' step above for details."
          else
            echo "✅ latest.json has $PLATFORM_COUNT platform(s)"
          fi

      # 创建 draft Release，上传全部产物 + latest.json
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: MCPHub Desktop ${{ steps.version.outputs.tag }}
          draft: true
          prerelease: false
          generate_release_notes: true
          files: |
            all-artifacts/**/*
            release-meta/latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
